name: gwcorp_field_agent
description: GWCORP Field Agent — waste intelligence platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_messaging: ^16.0.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Navigation
  go_router: ^14.3.0

  # Camera & images
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  cached_network_image: ^3.4.0

  # Network
  http: ^1.2.2

  # WebView
  webview_flutter: ^4.10.0

  # Utils
  intl: ^0.19.0
  path_provider: ^2.1.4
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  window_manager: ^0.4.3
  url_launcher: ^6.3.2
  cupertino_native_better: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
